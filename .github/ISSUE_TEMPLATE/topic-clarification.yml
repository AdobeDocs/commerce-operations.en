---
name: Incorrect or unclear topic
description: "Unclear or incorrect documentation: ambiguous guidelines, wrong or obsolete examples, typos, etc."
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report this issue!
        This request should only relate to the content of the experienceleague.adobe.com website.
        Requests that do not comply with our
        [Code of Conduct](https://github.com/AdobeDocs/commerce-operations.en/blob/main/code-of-conduct.md)
        or do not contain enough information may be closed at the maintainers' discretion.
  - type: checkboxes
    attributes:
      label: Is there an existing issue for this?
      description: Please search to see if an issue already exists for the documentation you are requesting.
      options:
        - label: I have searched the existing issues
          required: true
  - type: input
    attributes:
      label: Which topic?
      description: A link to the topic that needs clarification or correction
      placeholder: "Example: https://experienceleague.adobe.com/en/docs/commerce-operations/installation-guide/overview"
    validations:
      required: true
  - type: textarea
    attributes:
      label: What's wrong with the content?
    validations:
      required: true
  - type: textarea
    attributes:
      label: What changes do you propose?
  - type: textarea
    attributes:
      label: Anything else that can help to cover this?
